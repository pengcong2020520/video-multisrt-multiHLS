[project]
name = "video-multisrt-skill-voice"
version = "0.1.0"
description = "Voice synthesis skills and TTS provider adapters for video-multisrt."
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src", "../../agent-runtime/src"]
testpaths = ["tests"]
addopts = "-q"
